buildscript {
    ext {
        buildToolsVersion = "36.0.0"
        minSdkVersion = 24
        compileSdkVersion = 36
        targetSdkVersion = 36
        ndkVersion = "27.1.12297006"
        kotlinVersion = "2.1.20"
        playServicesVersion = "19.0.0" // Force consistent version
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath("com.android.tools.build:gradle")
        classpath("com.facebook.react:react-native-gradle-plugin")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin")
    }
}

apply plugin: "com.facebook.react.rootproject"

allprojects {
    repositories {
        maven {
            url "$rootDir/../node_modules/detox/Detox-android"
        }
    }
    configurations.all {
        resolutionStrategy {
            force "com.google.android.gms:play-services-location:21.2.0"
            force "com.google.android.gms:play-services-maps:19.0.0"
            force "com.google.android.gms:play-services-base:18.5.0"
        }
    }
}
